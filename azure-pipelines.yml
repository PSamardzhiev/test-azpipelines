trigger: none

pool:
  name: 'Default'

steps:
- task: AzureCLI@2
  displayName: 'Display Resource Group Names Only'
  inputs:
    azureSubscription: 'azure-tfm-sc' 
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "--- Resource Group Names ---"
      # This query selects only the 'name' attribute for every item in the list
      az group list --query "[].name" --output table